name: Build Plugin MTVehicles

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
    - name: Mengambil Kode
      uses: actions/checkout@v4
    
    - name: Menyiapkan Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
        
    - name: Memulai Proses Compile (Maven)
      run: mvn clean package
      
    - name: Mengunggah Hasil File .jar (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: MTVehicles-Plugin-BSNL 
        path: target/*.jar
